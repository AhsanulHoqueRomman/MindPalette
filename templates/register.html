{% extends "base.html" %}

{% block content %}
{% load crispy_forms_tags %}

<h3 class = "text-center"> Register Here</h3>
<form action="{% url "register" %}" method="POST" style="width:500px; margin:auto;">
    {% csrf_token %}
    {{ form | crispy }}
    <button class="btn btn-success mb-2" type="submit" >Submit</button>
</form>

{% endblock %}
