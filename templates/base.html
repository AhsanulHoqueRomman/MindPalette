{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>MIND PALETTE</title>

    <!-- Bootstrap 5 CSS -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Google Font -->

    <link href="https://fonts.googleapis.com/css?family=Playfair+Display:700,900"
          rel="stylesheet">

    <!-- Custom CSS -->

    <link href="{% static 'css/blog.css' %}"
          rel="stylesheet">

</head>

<body>

    <div class="container">

        <!-- Header -->

        <header class="blog-header py-3 border-bottom">

            <div class="row flex-nowrap justify-content-between align-items-center">

                <div class="col-8">

                    <a class="blog-header-logo text-dark text-decoration-none fs-2 fw-bold"
                       href="/">

                        MIND PALETTE

                    </a>

                </div>

                <div class="col-4 d-flex justify-content-end align-items-center">

                    <a class="btn btn-success btn-sm me-2"
                       href="#">

                        Login

                    </a>

                    <a class="btn btn-outline-secondary btn-sm"
                       href="#">

                        Register

                    </a>

                </div>

            </div>

        </header>


        <!-- Categories Navbar -->

        <div class="nav-scroller py-3 mb-4 border-bottom">

            <nav class="nav d-flex justify-content-between flex-wrap">

                {% for category in categories %}

                <a class="p-2 text-muted text-decoration-none"
                   href="{% url 'posts_by_category' category.id %}">

                    {{ category.category_name }}

                </a>

                {% endfor %}

            </nav>

        </div>


        <!-- Main Content -->

        {% block content %}

        {% endblock %}


        <!-- Footer -->

        <footer class="blog-footer border-top mt-5 py-4 text-center text-muted">

            <p class="mb-0">

                Django Blog built by

                <a href="#"
                   class="text-decoration-none">

                    Ahsanul Hoque Romman

                </a>

            </p>

        </footer>

    </div>


    <!-- Bootstrap 5 JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
