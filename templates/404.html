<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            font-family:Arial, sans-serif;
            background:#f8f9fa;
        }

        h1{
            font-size:120px;
            color:#198754;
        }

        h2{
            margin-bottom:15px;
            color:#333;
        }

        p{
            color:#666;
            margin-bottom:25px;
        }

        a{
            text-decoration:none;
            background:#198754;
            color:white;
            padding:12px 24px;
            border-radius:6px;
            transition:0.3s;
        }

        a:hover{
            opacity:0.9;
        }
    </style>
</head>
<body>

    <h1>404</h1>

    <h2>Page Not Found</h2>

    <p>The category you are looking for does not exist.</p>

    <a href="/">Go Back Home</a>

</body>
</html>
